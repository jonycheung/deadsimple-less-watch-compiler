name: CI

on:
  push:
    branches: ['*']
    tags-ignore: ['v*']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: yarn
      - name: Install deps
        run: yarn install --frozen-lockfile --check-files
      - name: Lint
        run: yarn lint
      - name: Format check
        run: yarn format:check
      - name: Typecheck
        run: yarn typecheck
      - name: Build
        run: yarn build
      - name: Test (with coverage)
        run: yarn coverage
